<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlowAI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🌥️ FlowAI</h1>
      <div id="current-time" class="time"></div>
    </header>

    <h2 id="greeting" class="greeting"></h2>

    <div class="dashboard">
      <div class="card current-task">
        <h3>Now</h3>
        <p id="current-task-text" class="task-text">No tasks yet</p>
      </div>

      <div class="card next-task">
        <h3>Next</h3>
        <p id="next-task-text" class="task-text">Add your first task below 👇</p>
      </div>
    </div>

    <section class="timeline-section">
      <h3>Today's Timeline</h3>
      <ul id="timeline-list" class="timeline"></ul>
    </section>

    <div class="add-task-form">
      <h3>Add New Task</h3>
      <input type="text" id="task-title" placeholder="What do you need to do?" required>
      <div class="time-inputs">
        <input type="time" id="task-start" required>
        <span>to</span>
        <input type="time" id="task-end" required>
      </div>
      <button id="add-task-btn">Add to Schedule</button>
    </div>

    <button id="voice-btn" class="voice-btn" title="Voice coming in Phase 3">
      🎤
    </button>
  </div>

  <!-- Classic script - no module complications -->
  <script src="js/app.js"></script>
</body>
</html>
